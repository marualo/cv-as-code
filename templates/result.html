<!DOCTYPE html>
<html>

<head>
    <title>Generated Cover Letter</title>
</head>

<body>

    <h1>Generated Cover Letter</h1>

    <div>
        <textarea
        id="cover-letter"
        rows="15"
        style="width: 100%;"
        >{{ cover_letter }}</textarea>
    </div>

<form action="/regenerate" method="POST">

    <input
        type="hidden"
        name="cv"
        value="{{ cv }}"
    >

    <input
        type="hidden"
        name="job_description"
        value="{{ job_description }}"
    >

    <input
        type="hidden"
        name="company_info"
        value="{{ company_info }}"
    >

    <button
        type="button"
        onclick="copyCoverLetter()"
        id="copy-button"
    > Copy Cover Letter
    </button>

    <button type="submit">
        Try Again
    </button>

    <input
        type="text"
        id="additional_instructions"
        name="additional_instructions"
        value="{{ additional_instructions }}"
        placeholder="Optional: Give additional instructions..."
        size="60"
    >

    <button
        type="button"
        onclick="clearInstructions()"
    > Clear
    </button>

</form>

<br><br>

<a href="/">Generate Another</a>

    <script>
        function copyCoverLetter() {
            const coverLetter = document.getElementById('cover-letter').value;
            navigator.clipboard.writeText(coverLetter);
           
            const button = document.getElementById('copy-button');
            button.innerText = 'Copied!';
            
            setTimeout(() => {
                button.innerText = 'Copy Cover Letter';
            }, 2000);
        }

        function clearInstructions() {
            document.getElementById('additional_instructions').value = '';
        }
    </script>

</body>

</html>
