<!DOCTYPE html>
<html>
<head>
    <title>CV as Code</title>
</head>
<body>
    <h1>CV as Code</h1>

    <form method="POST">

        <h3>Your CV</h3>
        <textarea name="cv" rows="10" cols="80"></textarea>

        <h3>Job Description</h3>
        <textarea name="job_description" rows="10" cols="80"></textarea>

        <h3>Company Information</h3>
        <textarea name="company_info" rows="10" cols="80"></textarea>

        <br><br>

        <button type="submit">
            Generate Cover Letter
        </button>

    </form>
</body>
</html>
